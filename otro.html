    <style>
        body {
            background-color: #d689c1; /* Color rosa del fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .tarjeta {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            background-color: black;
            border-radius: 50%;
            margin: 0 auto 15px;
        }

        h2 { margin: 5px 0; }
        p { color: #888; margin-bottom: 20px; }

        /* Contenedor de iconos */
        .redes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .cuadro {
            width: 30px;
            height: 30px;
            background-color: black;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
        }

        /* Botones de prácticas */
        .practicas {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn-p {
            background-color: black;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
          img{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.contenedor-botones {
  display: flex;             /* Activa el diseño en fila */
  justify-content: center;   /* Centra los botones horizontalmente */
  gap: 10px;                 /* Crea un pequeño espacio entre cada botón */
  margin-top: 20px;          /* Espacio superior para separarlos del texto */
}

.boton {
  padding: 8px 16px;         /* Ajusta el tamaño interno de los botones */
  background-color: #333;    /* Color oscuro que tenías */
  color: white;              /* Color del texto */
  border: none;
  border-radius: 4px;        /* Bordes redondeados */
  cursor: pointer;
}
